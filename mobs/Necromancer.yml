AldousTheMadCleric:
  Type: HUSK # Using Husk ensures he doesn't burn in daylight, just in case
  Display: '&5Aldous, the Mad Cleric'
  Disguise: Necromancer
  Health: 800
  Damage: 20
  Faction: CultOfAldous
  Modules:
    ThreatTable: true
  BossBar:
    Enabled: true
    Title: '&5&lAldous, the Mad Cleric'
    Range: 64
    Color: PURPLE
    Style: SEGMENTED_6
  Options:
    PreventOtherDrops: true
    KnockbackResistance: 0.6
    MovementSpeed: 0.22 # Slightly slower than a standard zombie
    FollowRange: 32
    MaxCombatRange: 64
    Despawn: false
  DamageModifiers:
    # As a master of the dead, he resists Wither/Poison
    - WITHER 0
    - POISON 0
    - FALL 0
    - SUFFOCATION 0
    # 50% damage reduction from arrows to encourage players to risk getting close
    - PROJECTILE 0.50 
    - LAVA 0 # Immune to lava to prevent cheesy deaths
    - FIRE 0 # Immune to fire to prevent cheesy deaths
    - DROWNING 0 # Immune to drowning to prevent cheesy deaths

  Equipment:
    - mmoitems{type=ARMOR;id=MAD_CLERIC_HOOD} HEAD
    - mmoitems{type=ARMOR;id=MAD_CLERIC_ROBES} CHEST
    - mmoitems{type=ARMOR;id=MAD_CLERIC_LEGGINGS} LEGS
    - mmoitems{type=ARMOR;id=MAD_CLERIC_BOOTS} FEET
    - mmoitems{type=SWORD;id=GRAVE_CALLER_SCYTHE} HAND
  
  # --- NEW: BOSS LOOT TABLE ---
  # Format: - mmoitems{type=TYPE;id=ID} <amount> <chance_from_0_to_1>
  Drops:
    # 1. THE GUARANTEED CRAFTING PROGRESSION
    # Drops 1 to 2 Cores with a 100% chance (1.0)
    - mmoitems{type=MATERIAL;id=FRACTURED_ARCANIC_CORE} 1-2 1.0
    
    # 2. THE ARMOR SET (5% chance per piece)
    # This means a player will have to fight him a few times to get the full stealth set!
    - mmoitems{type=ARMOR;id=MAD_CLERIC_HOOD} 1 0.05
    - mmoitems{type=ARMOR;id=MAD_CLERIC_ROBES} 1 0.05
    - mmoitems{type=ARMOR;id=MAD_CLERIC_LEGGINGS} 1 0.05
    - mmoitems{type=ARMOR;id=MAD_CLERIC_BOOTS} 1 0.05
    
    # 3. THE SCYTHE (1% chance - The rarest drop)
    - mmoitems{type=SWORD;id=GRAVE_CALLER_SCYTHE} 1 0.01

  # --- ADVANCED AI CONFIGURATION ---
  AIGoalSelectors:
    # 1. Wipes the default Vanilla Minecraft AI
    - clear
    
    # 2. Survival (Highest Priority): Prevents drowning if players try to flood the room
    - float 
    
    # 3. NEW DISENGAGE LOGIC: If a player gets within 8 blocks, he overrides everything and sprints away
    - fleeplayers{distance=10;speed=1.8}
    
    # 4. Tactical Positioning: If the player is outside 8 blocks, he maintains his spellcasting distance
    - MoveWithinDistanceOfTarget
    
    # 5. Anti-Cheese: If players leave the arena or glitch out, he tethers back
    - gotospawnlocation
    
    # 6. Idle Behavior (Lowest Priority): Looks around when combat ends
    - randomlookaround

  AITargetSelectors:
    - clear
    
    # 1. Self-Defense: Instantly snaps his aggro to anything that hits him (wolves, golems, arrows)
    - hurtbytarget
    
    # 2. Primary Aggro: Actively scans for players to attack
    - players
    
    # 3. Minion Clear: Attacks Iron Golems if no players are in sight
    - irongolems

  # --- COMBAT LOGIC & SKILL TRIGGERS ---
  Skills:
    # --- CONSTANT MAGIC CASTING (High Frequency) ---
    - skill{s=SoulSpear} @target ~onTimer:80
    - skill{s=NecroticBurst} @self ~onTimer:160
    - skill{s=AldousGraspingGraves} ~onTimer:300
    - skill{s=PhantomLift} @target ~onTimer:280
    
    # --- THE RISING TENSION LOOP (Summon x2 -> Detonate) ---
    # Wave 1 spawns at 16s. Wave 2 spawns at 32s.
    - skill{s=AldousEndlessChoir} ~onTimer:320
    # Buffs the swarm at 25s
    - skill{s=AldousProfaneConsecration} ~onTimer:500
    # Detonates up to 3 minions at 45s
    - skill{s=AldousCorpseDetonation} ~onTimer:900

    # --- ANTI-CHEESE & MOVEMENT ---
    # Checks for snipers every 20 seconds. If they are >15 blocks away, he yanks them in!
    - skill{s=GraspOfTheDamned} @target ~onTimer:400
    # Cruzader pull skill to counter snipers
    - skill{s=CruzaderPull} @target ~onTimer:500
    - skill{s=ShadowBlink} @self ~onTimer:600
    
    # --- HEALTH-TRIGGERED EVENTS ---
    - skill{s=AldousArise} ~onDamaged =80%
    - skill{s=AldousArise} ~onDamaged =50%
    - skill{s=AldousArise} ~onDamaged =30%
    - skill{s=AldousArise} ~onDamaged =20%
    
    # Defensive Shield: Checked every 15 seconds, only activates below 20% HP.
    - skill{s=AldousMartyrsBond} ~onTimer:300 <20%

    # --- NEW: DUNGEON MANAGER INTEGRATION ---
    # He NO LONGER handles the doors or the fail states! 
    # All he does is shout "I'm dead!" to the invisible Armor Stand when he dies.
    - signal{s=BOSS_DEFEATED} @MobsInRadius{types=DungeonEntranceTrigger;r=50} ~onDeath
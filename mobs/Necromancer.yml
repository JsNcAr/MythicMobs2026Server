AldousTheMadCleric:
  Type: HUSK # Using Husk ensures he doesn't burn in daylight, just in case
  Display: '&5Aldous, the Mad Cleric'
  Disguise: Necromancer
  Health: 350
  Damage: 5
  Faction: CultOfAldous
  Modules:
    ThreatTable: true
  BossBar:
    Enabled: true
    Title: '&5&lAldous, the Mad Cleric'
    Range: 64
    Color: PURPLE
    Style: SEGMENTED_6
  Options:
    PreventOtherDrops: true
    KnockbackResistance: 0.6
    MovementSpeed: 0.22 # Slightly slower than a standard zombie
    FollowRange: 32
    MaxCombatRange: 64
    Despawn: false
  DamageModifiers:
    # As a master of the dead, he resists Wither/Poison
    - WITHER 0
    - POISON 0
    - FALL 0
    - SUFFOCATION 0
    # 50% damage reduction from arrows to encourage players to risk getting close
    - PROJECTILE 0.50 
    - LAVA 0 # Immune to lava to prevent cheesy deaths
    - FIRE 0 # Immune to fire to prevent cheesy deaths
    - DROWNING 0 # Immune to drowning to prevent cheesy deaths

  Equipment:
    - mmoitems{type=ARMOR;id=MAD_CLERIC_HOOD} HEAD
    - mmoitems{type=ARMOR;id=MAD_CLERIC_ROBES} CHEST
    - mmoitems{type=ARMOR;id=MAD_CLERIC_LEGGINGS} LEGS
    - mmoitems{type=ARMOR;id=MAD_CLERIC_BOOTS} FEET
    - mmoitems{type=SWORD;id=GRAVE_CALLER_SCYTHE} HAND
  
  # --- NEW: BOSS LOOT TABLE ---
  # Format: - mmoitems{type=TYPE;id=ID} <amount> <chance_from_0_to_1>
  Drops:
    # 1. THE GUARANTEED CRAFTING PROGRESSION
    # Drops 1 to 2 Cores with a 100% chance (1.0)
    # - mmoitems{type=MATERIAL;id=FRACTURED_ARCANIC_CORE} 1-2 1.0
    
    # 2. THE ARMOR SET (5% chance per piece)
    # This means a player will have to fight him a few times to get the full stealth set!
    - mmoitems{type=ARMOR;id=MAD_CLERIC_HOOD} 1 0.05
    - mmoitems{type=ARMOR;id=MAD_CLERIC_ROBES} 1 0.05
    - mmoitems{type=ARMOR;id=MAD_CLERIC_LEGGINGS} 1 0.05
    - mmoitems{type=ARMOR;id=MAD_CLERIC_BOOTS} 1 0.05
    
    # 3. THE SCYTHE (1% chance - The rarest drop)
    - mmoitems{type=SWORD;id=GRAVE_CALLER_SCYTHE} 1 0.01

  # --- ADVANCED AI CONFIGURATION ---
  AIGoalSelectors:
    - clear
    - float # Prevents drowning if players try to flood the room
    # Forces him to maintain a tactical distance instead of rushing for melee
    - MoveWithinDistanceOfTarget
    # If players use glitches to leave the room, he tethers back to his spawn
    - gotospawnlocation
    - randomlookaround
  AITargetSelectors:
    - clear
    # Immediately targets anything that damages him (Snow Golems, wolves, players)
    - hurtbytarget
    - players
    # Actively scans for Iron Golems
    - irongolems

  # --- COMBAT LOGIC & SKILL TRIGGERS ---
  Skills:
    # --- CONSTANT MAGIC CASTING (High Frequency) ---
    
    # Ranged Magic: Fires a Soul Spear every 4 seconds. This acts as his "Basic Attack."
    - skill{s=SoulSpear} @target ~onTimer:80
    
    # Anti-Melee: Cast every 8 seconds, but ONLY if a player is within 5 blocks.
    - skill{s=NecroticBurst} @self ~onTimer:160
    
    # Area Denial: Cast every 15 seconds. Forces players to keep moving.
    - skill{s=AldousGraspingGraves} ~onTimer:300
    
    # --- THE SUMMONING LOOP (Low Frequency, High Impact) ---
    
    # Spawns the swarm every 35 seconds (up from 18s). Gives players time to actually fight him.
    - skill{s=AldousEndlessChoir} ~onTimer:700
    
    # Detonates minions every 45 seconds (up from 25s). 
    # Because this heals him, making it rare makes it feel like a critical "DPS Check" phase.
    - skill{s=AldousCorpseDetonation} ~onTimer:900
    
    # Buffs the swarm every 50 seconds. 
    - skill{s=AldousProfaneConsecration} ~onTimer:1000
    
    # --- HEALTH-TRIGGERED EVENTS (Unchanged) ---
    
    # The Wall (Fallen Paladins): Triggers exactly once per threshold.
    - skill{s=AldousArise} ~onDamaged =80%
    - skill{s=AldousArise} ~onDamaged =50%
    - skill{s=AldousArise} ~onDamaged =20%
    
    # Defensive Shield: Checked every 15 seconds, only activates below 15% HP.
    - skill{s=AldousMartyrsBond} ~onTimer:300 <15%  
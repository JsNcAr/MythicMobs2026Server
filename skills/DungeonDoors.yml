OpenQuarantineVault:
  TargetConditions:
  # Checks if the player is holding the specific key type
  - holding{m=tripwire_hook} true
  Skills:
  # 1. Provide feedback and consume the key
  - message{m="&8[&cCuarentena&8] &7La pesada cerradura cede con un chirrido metálico..."} @target
  - command{c="minecraft:clear <target.name> tripwire_hook 1"}
  
  # 2. Cinematic Audio
  - sound{s=block.iron_door.open;v=2;p=0.5} @self
  - sound{s=block.stone.break;v=2;p=0.5} @self
  
  # 3. Open the Door (REPLACE X Y Z with the actual block coordinates of your door)
  - command{c="fill -4857 81 1562 -4857 82 1562 air"}
  
  # 4. Wait 5 seconds (100 ticks) to let them walk through
  - delay 100
  
  # 5. Slam the door shut behind them
  - command{c="fill -4857 81 1562 -4857 82 1562 iron_block"}
  - sound{s=block.iron_door.close;v=2;p=0.5} @self
  - message{m="&8[&cCuarentena&8] &cLa puerta se cierra de golpe a tus espaldas."} @target

DungeonStartSequence:
  Conditions:
  # This ensures the sequence only runs if the door is currently "Unlocked"
  - stance{stance=Locked} false
  Skills:
  # 1. Instantly lock the tripwire so it stops scanning
  - setstance{stance=Locked} @self
  
  # 2. Give the 10-second warning
  - message{m="&c&lThe dungeon gates will close in 10 seconds!"} @PlayersInRadius{r=20}
  - sound{s=block.note_block.pling;v=1;p=1} @PlayersInRadius{r=20}
  
  # 3. Wait 10 seconds (200 ticks) to let the rest of the party enter
  - delay 200
  
  # 4. SLAM THE DOOR SHUT! (Replace the X Y Z with your door coordinates)
  - command{c="minecraft:fill -4857 -28 1530 -4857 -27 1530 minecraft:iron_bars"} @self
  - sound{s=block.anvil.land;v=1;p=0.5} @PlayersInRadius{r=30}
  - message{m="&4&lThe gates have slammed shut!"} @PlayersInRadius{r=30}
  
  # 5. Spawn Aldous in the center of the room! 
  # (@forward{f=15} spawns him exactly 15 blocks in front of the doorway)
  - summon{mob=AldousTheNecromancer;amount=1;y=0} @forward{f=15}

DungeonEnd_Win:
  Skills:
  # 1. Open the door (Replacing the iron bars with air)
  - command{c="minecraft:fill -4857 -28 1530 -4857 -27 1530 minecraft:air"} @self
  - sound{s=block.iron_door.open;v=1;p=0.5} @PlayersInRadius{r=40}
  - message{m="&a&lThe Necromancer is defeated. The gates open."} @PlayersInRadius{r=40}
  
  # 2. Reset the Tripwire so the dungeon can trigger again later!
  - setstance{stance=Unlocked} @MobsInRadius{types=DungeonEntranceTrigger;r=50}

DungeonEnd_Fail:
  Conditions:
  # This checks if there are NO PLAYERS within 40 blocks of the boss room
  - playernotwithin{d=40} true
  Skills:
  # 1. Open the door (Replacing the iron bars with air)
  - command{c="minecraft:fill -4857 -28 1530 -4857 -27 1530 minecraft:crimson_door"} @self
  
  # 2. Reset the Tripwire for the next group
  - setstance{stance=Unlocked} @MobsInRadius{types=DungeonEntranceTrigger;r=50}
  
  # 3. Despawn Aldous so he doesn't duplicate when the next group enters
  - remove @self
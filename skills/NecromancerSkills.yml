# =================================================================
# ALDOUS, THE MAD NECROMANCER - SKILL CONFIGURATION
# Archetype: Slow Commander, High HP, Heavy Summoner, Area Denial
# =================================================================

# 1. The Endless Choir (Passive Wave Summoning)
AldousEndlessChoir:
  Skills:
  # Cinematic warning
  - sound{s=entity.zombie_villager.converted;v=1;p=0.5} @self
  - message{m="&8[&5Aldous&8] &7¡Levántense, mi rebaño... la Luz nos ha abandonado!"} @PlayersInRadius{r=30}
  - delay 20
  # The Summon: Calls 3 Acolytes in a 5 block radius
  - summon{mob=CorruptedAcolyte;amount=3;radius=5;noise=5} @self
  - effect:particlesphere{particle=soul;amount=100;radius=3} @self

# 2. Arise! (Triggered Heavy Summon)
AldousArise:
  Skills:
  - sound{s=entity.wither.spawn;v=1;p=0.5} @self
  - message{m="&8[&5Aldous&8] &7¡Protege a tu Clérigo, Paladín!"} @PlayersInRadius{r=30}
  - effect:particlesphere{particle=large_smoke;amount=150;radius=2} @self
  # Summons the heavy mini-boss
  - summon{mob=FallenPaladin;amount=1;radius=3;noise=2} @self

# 3. Grasping Graves (Area Denial & Crowd Control)
AldousGraspingGraves:
  Skills:
  - sound{s=entity.skeleton.ambient;v=1;p=0.1} @self
  - message{m="&8[&5Aldous&8] &7La tumba reclama tus pasos..."} @PlayersInRadius{r=30}
  # Targets players in a 25 block radius
  - effect:particlesphere{particle=ash;amount=50;radius=1} @PlayersInRadius{r=25}
  - delay 20
  # Applies Slowness 4 for 3 seconds, effectively rooting them
  - potion{type=SLOW;duration=60;level=3} @PlayersInRadius{r=25}
  - damage{amount=4;ignoreArmor=false} @PlayersInRadius{r=25}
  - effect:particlesphere{particle=block_crack;material=DIRT;amount=50;radius=1} @PlayersInRadius{r=25}

# 4. Profane Consecration (Dark Aura)
AldousProfaneConsecration:
  Skills:
  - sound{s=block.beacon.activate;v=1;p=0.5} @self
  - message{m="&8[&5Aldous&8] &7¡Báñate en la resonancia oscura!"} @PlayersInRadius{r=30}
  - effect:particlesphere{particle=spell_witch;amount=300;radius=15} @self
  # Punishes players in a 15 block radius with Wither
  - potion{type=WITHER;duration=100;level=0} @PlayersInRadius{r=15}
  # Buffs his own minions in the same radius with Speed and Strength
  - potion{type=SPEED;duration=100;level=1} @MobsInRadius{types=CorruptedAcolyte,FallenPaladin;r=15}
  - potion{type=INCREASE_DAMAGE;duration=100;level=0} @MobsInRadius{types=CorruptedAcolyte,FallenPaladin;r=15}

# 5. Martyr's Bond (Damage Mitigation)
AldousMartyrsBond:
  Skills:
  - message{m="&8[&5Aldous&8] &7¡Mi rebaño sostiene mi carne!"} @PlayersInRadius{r=30}
  - effect:particlesphere{particle=enchantment_table;amount=200;radius=2} @self
  - sound{s=item.shield.block;v=1;p=0.5} @self
  # Gives Aldous a massive temporary absorption shield
  - shield{amount=100;maxshield=100} @self

# 6. Corpse Detonation (The Punisher Mechanic)
AldousCorpseDetonation:
  Skills:
  - message{m="&8[&5Aldous&8] &7¡Tus cuerpos sirven a un propósito mayor!"} @PlayersInRadius{r=30}
  - sound{s=entity.ghast.warn;v=1;p=0.5} @self
  # CORRECTED: Changed 'skill' to 'sudoskill'. Now the Acolytes cast the bomb timer!
  - sudoskill{s=CorpseBombTimer} @MobsInRadius{types=CorruptedAcolyte;r=30;limit=3;sort=RANDOM}

# 6b. The Minion's Bomb Timer (Tied to the Cruzader's magic)
CorpseBombTimer:
  Skills:
  - potion{type=GLOWING;duration=60;level=0} @self
  - potion{type=SLOW;duration=60;level=5} @self
  - effect:particlesphere{particle=flame;amount=20;radius=1} @self
  - sound{s=entity.creeper.primed;v=1;p=1.2} @self
  - delay 20
  - effect:particlesphere{particle=flame;amount=40;radius=1.5} @self
  - sound{s=entity.creeper.primed;v=1;p=1.5} @self
  - delay 20
  
  # The Explosion!
  - skill{s=CruzaderImplosion} @self
  
  # NEW: The Acolyte transfers its life force to Aldous!
  # Heals Aldous for 50 HP per exploding minion. 
  - heal{amount=50} @MobsInRadius{types=AldousTheMadCleric;r=40}
  
  # Optional: A cool visual showing the soul traveling/healing
  - effect:particles{particle=soul;amount=20;hS=1;vS=1} @MobsInRadius{types=AldousTheMadCleric;r=40}
  - sound{s=entity.wither.spawn;v=0.5;p=2.0} @MobsInRadius{types=AldousTheMadCleric;r=40}
  
  # Instantly kills the Acolyte
  - suicide @self

# --- ANTI-MELEE BURST (Upgraded) ---
NecroticBurst:
  Conditions:
  - targetwithin{d=5} true
  Skills:
  - message{m="&8[&5Aldous&8] &7¡Retrocede, mortal insensato!"} @PlayersInRadius{r=10}
  - sound{s=entity.generic.explode;v=1;p=0.5} @self
  - effect:particlesphere{particle=soul;amount=100;radius=4} @self
  - damage{amount=10} @PlayersInRadius{r=5}
  
  # 1. Throws the players UP and AWAY
  - throw{velocity=1.5;velocityY=0.6} @PlayersInRadius{r=5}
  
  # 2. NEW: Aldous launches HIMSELF backward to create even more distance!
  # A negative velocity (-1.5) shoots the caster directly backward from wherever they are looking.
  - leap{velocity=-1.5;velocityY=0.4} @self

# --- RANGED SPELL: SOUL SPEAR ---
SoulSpear:
  Skills:
  - sound{s=entity.wither.shoot;v=1;p=1.2} @self
  # This launches the projectile at his target. It travels 15 blocks per second.
  - projectile{onTick=SoulSpear-Tick;onHit=SoulSpear-Hit;v=15;i=1;hR=1;vR=1;MaxRange=30} @target

# What the projectile looks like while flying through the air
SoulSpear-Tick:
  Skills:
  # A trail of blue soul fire
  - effect:particles{particle=soul_fire_flame;amount=3;vSpread=0.1;hSpread=0.1} @origin
  - effect:particles{particle=ash;amount=5;vSpread=0.2;hSpread=0.2} @origin

# What happens when the projectile hits a player (or a wall)
SoulSpear-Hit:
  Skills:
  - damage{amount=8}
  # Applies Wither 2 for 3 seconds
  - potion{type=WITHER;duration=60;level=1} 
  - effect:particles{particle=soul;amount=20;hS=0.5;vS=0.5} @origin
  - sound{s=entity.player.hurt_on_fire;v=1;p=0.8} @origin
GravewalkerAura:
  Skills:
  # A very subtle visual effect so the player knows the stealth is active
  - effect:particles{particle=ash;amount=5;vSpread=1;hSpread=0.5} @self
  
  # Clears the threat tables of any nearby mindless undead, making them ignore the player
  - clearthreat @MobsInRadius{types=ZOMBIE,SKELETON,HUSK,DROWNED,STRAY,WITHER_SKELETON;r=15}